name: Deploy

# Builds the Astro/Starlight docs site and deploys to Cloudflare Pages
# project `prysmid-docs`. `main` → production, other branches → preview
# deployments with auto-comment on the PR. Mirrors `web/.github/workflows/deploy.yml`.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write
  pull-requests: write

jobs:
  build:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Astro 6 requires Node >=22.12. setup-node@v4 supports it natively.
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build static site
        run: npm run build
        env:
          NODE_ENV: production

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # `branch` controls Pages preview vs production routing.
          # main → production. Any other branch → preview deployment with a unique URL.
          command: >-
            pages deploy dist
            --project-name=prysmid-docs
            --branch=${{ github.head_ref || github.ref_name }}
            --commit-dirty=true

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const url = "${{ steps.deploy.outputs.deployment-url }}";
            if (!url) return;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `🚀 **Docs preview deployed** → ${url}`
            });
